<!DOCTYPE html>
<html lang="en">
<head>

<style>
:root {
  --bg: #0a0a0a;
  --text: #ededed;
  --muted: #8a8a8a;
  --rule: #1f1f1f;
  --rule-strong: #2c2c2c;
  --link: #ededed;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
  font-size: 19px;
  line-height: 1.6;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
a {
  color: var(--link);
  text-decoration: none;
  border-bottom: 1px solid var(--rule-strong);
  transition: border-color 160ms ease;
}
a:hover { border-bottom-color: var(--text); }
nav {
  max-width: 680px;
  margin: 0 auto;
  padding: 28px 28px 0;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.nav-name {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 1.05rem;
  font-weight: 500;
  border-bottom: none;
  color: var(--text);
}
.nav-links {
  font-family: 'Inter', sans-serif;
  font-size: 0.76rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  display: flex;
  gap: 22px;
}
.nav-links a {
  border-bottom: none;
  color: var(--muted);
  transition: color 160ms ease;
}
.nav-links a:hover,
.nav-links a.active { color: var(--text); }
main {
  max-width: 680px;
  margin: 0 auto;
  padding: 52px 28px 120px;
}
h1.page-title {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 2.2rem;
  font-weight: 500;
  margin: 0 0 48px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--rule);
  letter-spacing: -0.005em;
}
.contact-block {
  margin-bottom: 36px;
}
.contact-label {
  font-family: 'Inter', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--muted);
  margin: 0 0 8px;
}
.contact-value {
  font-size: 1.05rem;
}
.links-row {
  font-family: 'Inter', sans-serif;
  font-size: 0.82rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  display: flex;
  gap: 18px;
  flex-wrap: wrap;
  margin-top: 40px;
  padding-top: 28px;
  border-top: 1px solid var(--rule);
}
footer {
  max-width: 680px;
  margin: 0 auto;
  padding: 18px 28px 48px;
  border-top: 1px solid var(--rule);
  color: var(--muted);
  font-size: 0.85rem;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.02em;
}
::selection { background: #ededed; color: #0a0a0a; }
@media (max-width: 520px) {
  nav { flex-direction: column; gap: 14px; padding: 22px 20px 0; }
  main { padding: 36px 20px 72px; }
  body { font-size: 18px; }
  footer { padding-left: 20px; padding-right: 20px; }
}
</style>
</head>

    <a href="contact.html" class="active">Contact</a>

    </p>
  </div>

  <div class="contact-block">
    <p class="contact-label">Based in</p>
    <p class="contact-value">Barcelona, Spain</p>
  </div>

  <div class="links-row">
    <a href="cv.pdf" target="_blank">CV</a>
    <a href="https://scholar.google.com/citations?user=uBGciMwAAAAJ&hl=en" target="_blank" rel="noopener">Scholar</a>
    <a href="https://www.linkedin.com/in/natasha-greenstein-31a405197/" target="_blank" rel="noopener">LinkedIn</a>
  </div>
</main>

<footer>
  &copy; Natasha Greenstein &middot; Barcelona
</footer>
